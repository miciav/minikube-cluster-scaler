apiVersion: apps/v1
kind: Deployment
metadata:
  name: autoscaler-pressure
  namespace: default
spec:
  # The demo script adjusts CPU requests to the node capacity at runtime.
  replicas: 4
  selector:
    matchLabels:
      app: autoscaler-pressure
  template:
    metadata:
      labels:
        app: autoscaler-pressure
    spec:
      containers:
        - name: pause
          # This default is useful when applying the manifest directly.
          image: registry.k8s.io/pause:3.10
          resources:
            requests:
              cpu: 600m
              memory: 64Mi
            limits:
              cpu: 600m
              memory: 64Mi
